<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<title>Hibi 日々 — Todo</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#3A5A8A"/>
<meta name="description" content="日々の積み重ねを、美しく。カレンダー連動の和モダンTodoアプリ。"/>
<link rel="manifest" href="./manifest.webmanifest"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Hibi"/>
<link rel="apple-touch-icon" href="./apple-touch-icon.png"/>
<link rel="icon" type="image/svg+xml" href="./icon.svg"/>
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png"/>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  html, body { margin:0; padding:0; min-height:100vh; }
  body {
    font-family: 'Noto Sans JP', -apple-system, system-ui, sans-serif;
    background: #EAE6DB;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    color: #2B2A26;
  }
  :root {
    --hibi-font-body: 'Noto Sans JP', -apple-system, system-ui, sans-serif;
    --hibi-font-display: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
  }
  body.font-mincho {
    --hibi-font-body: 'Noto Serif JP', 'Noto Sans JP', serif;
    --hibi-font-display: 'Noto Serif JP', serif;
  }
  body { font-family: var(--hibi-font-body); }
  /* Fullscreen (mobile / PWA standalone): drop the centered scroll container */
  body.hibi-fullscreen { overflow: hidden; background: #FAF7F0; overscroll-behavior: none; }
  body.hibi-fullscreen.hibi-dark { background: #15130F; }
  body.hibi-fullscreen #root { height: 100vh; height: 100dvh; }
  @keyframes fade-in { from { opacity:0 } to { opacity:1 } }
  @keyframes slide-up { from { transform:translateY(30px); opacity:0 } to { transform:translateY(0); opacity:1 } }
  button { font-family: inherit; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  .paper-bg {
    background-color: #FAF7F0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184,74,59,0.025) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(122,141,63,0.03) 0, transparent 45%);
  }
  .paper-bg-dark {
    background-color: #15130F;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184,74,59,0.06) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(122,141,63,0.05) 0, transparent 45%);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="components/data.jsx"></script>
  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/TaskCell.jsx"></script>
  <script type="text/babel" src="components/TodayScreen.jsx"></script>
  <script type="text/babel" src="components/CalendarScreen.jsx"></script>
  <script type="text/babel" src="components/ListsStatsScreens.jsx"></script>
  <script type="text/babel" src="components/AddTaskModal.jsx"></script>
  <script type="text/babel" src="components/TaskDetail.jsx"></script>
  <script type="text/babel" src="components/CategoryManager.jsx"></script>
  <script type="text/babel" src="components/Chrome.jsx"></script>

  <script type="text/babel" data-presets="react">
    var useState = React.useState;
    var useEffect = React.useEffect;
    var useMemo = React.useMemo;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dark": true,
      "density": "comfy",
      "font": "mincho",
      "accent": "#6B7FA8"
    }/*EDITMODE-END*/;

    function App() {
      const [tab, setTab] = useState(() => {
        const t = localStorage.getItem('hibi-tab');
        return (t === 'stats') ? 'today' : (t || 'today');
      });
      const [tasks, setTasks] = useState(() => {
        try {
          const raw = localStorage.getItem('hibi-tasks');
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) {
              // Revive Date fields (stored as ISO strings via JSON.stringify)
              return parsed.map(t => ({
                ...t,
                due: t.due ? new Date(t.due) : undefined,
                end: t.end ? new Date(t.end) : undefined,
              }));
            }
          }
        } catch(e) {}
        return INITIAL_TASKS;
      });
      // Persist tasks on every change
      useEffect(() => {
        try { localStorage.setItem('hibi-tasks', JSON.stringify(tasks)); } catch(e) {}
      }, [tasks]);
      const [lists, setListsState] = useState(() => {
        try {
          const raw = localStorage.getItem('hibi-lists');
          if (raw) { const parsed = JSON.parse(raw); if (Array.isArray(parsed) && parsed.length) return parsed; }
        } catch(e) {}
        return DEFAULT_LISTS;
      });
      // keep window.LISTS synced so non-prop-threaded reads in other components see the latest
      useEffect(() => {
        window.LISTS = lists;
        try { localStorage.setItem('hibi-lists', JSON.stringify(lists)); } catch(e) {}
      }, [lists]);
      const setLists = setListsState;
      const [categoryMgrOpen, setCategoryMgrOpen] = useState(false);
      const [addOpen, setAddOpen] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [detail, setDetail] = useState(null);
      const [search, setSearch] = useState('');
      const [settings, setSettings] = useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);

      useEffect(() => { localStorage.setItem('hibi-tab', tab); }, [tab]);

      useEffect(() => {
        document.body.classList.toggle('font-mincho', settings.font === 'mincho');
      }, [settings.font]);

      useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const updateSettings = (fn) => {
        setSettings(prev => {
          const next = typeof fn === 'function' ? fn(prev) : fn;
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
          return next;
        });
      };

      const onToggle = (id) => setTasks(ts => ts.map(t => t.id===id ? {...t, done:!t.done} : t));
      const onDelete = (id) => setTasks(ts => ts.filter(t => t.id!==id));
      const onFlag = (id) => setTasks(ts => ts.map(t => t.id===id ? {...t, flag:!t.flag} : t));
      const onAdd = (task) => setTasks(ts => [...ts, task]);
      const onUpdate = (updated) => setTasks(ts => ts.map(t => t.id===updated.id ? updated : t));
      // When the user taps "編集" in the detail sheet, switch to the add modal in edit mode.
      const onStartEdit = (task) => { setEditingTask(task); setDetail(null); setAddOpen(true); };

      // -- Notifications scheduler --
      // Schedules an in-app setTimeout for every un-fired reminder.
      // Works while the page is open (iOS PWA: while the app is foreground or was
      // recently foregrounded). Full background push would require a server.
      useEffect(() => {
        if (typeof Notification === 'undefined') return;
        if (Notification.permission !== 'granted') return;

        const OFFSETS_MIN = {
          'atdue': 0, '5min': 5, '15min': 15, '30min': 30,
          '1h': 60, '2h': 120, '1d': 1440, '2d': 2880, '1w': 10080,
        };
        // Track what we've already fired so we don't double-fire across re-renders.
        const firedKey = 'hibi-fired-reminders';
        let fired;
        try { fired = new Set(JSON.parse(localStorage.getItem(firedKey) || '[]')); }
        catch(e) { fired = new Set(); }
        const persistFired = () => {
          // Cap the set so it doesn't grow forever
          const arr = [...fired].slice(-500);
          try { localStorage.setItem(firedKey, JSON.stringify(arr)); } catch(e) {}
        };

        const show = (task) => {
          const when = task.allDay ? '終日' : fmtTime(task.due);
          const body = `${when} · ${task.title}`;
          try {
            // Prefer SW registration when available so the notification survives
            // brief blur; fall back to a plain Notification.
            if (navigator.serviceWorker?.controller && navigator.serviceWorker.getRegistration) {
              navigator.serviceWorker.getRegistration().then(reg => {
                if (reg?.showNotification) {
                  reg.showNotification('Hibi 日々', {
                    body, icon: './icon-192.png', badge: './icon-192.png',
                    tag: task.id, renotify: true,
                  });
                } else {
                  new Notification('Hibi 日々', { body });
                }
              });
            } else {
              new Notification('Hibi 日々', { body });
            }
          } catch(e) { console.warn('notify failed', e); }
        };

        const timers = [];
        const now = Date.now();
        tasks.forEach(t => {
          if (t.done) return;
          if (!t.remind || t.remind === 'none') return;
          if (!t.due) return;
          const offMin = OFFSETS_MIN[t.remind];
          if (offMin === undefined) return;
          const dueMs = (t.due instanceof Date ? t.due : new Date(t.due)).getTime();
          const fireAt = dueMs - offMin * 60000;
          const key = `${t.id}:${t.remind}:${dueMs}`;
          if (fired.has(key)) return;
          const delay = fireAt - now;
          if (delay < -60000) {
            // More than 1 min past its fire time — mark as fired, don't show stale.
            fired.add(key); persistFired(); return;
          }
          if (delay < 0) {
            // Just missed it — fire immediately.
            show(t); fired.add(key); persistFired(); return;
          }
          // setTimeout max is ~24.8 days (2^31 ms). We re-run this effect
          // whenever tasks change, so long-horizon reminders get re-scheduled
          // when the user re-opens the app.
          if (delay > 2 ** 31 - 1) return;
          const id = setTimeout(() => {
            show(t); fired.add(key); persistFired();
          }, delay);
          timers.push(id);
        });
        return () => { timers.forEach(clearTimeout); };
      }, [tasks]);

      const dark = settings.dark;
      const filtered = useMemo(() => search ? tasks.filter(t=>t.title.includes(search)) : tasks, [search, tasks]);

      const titleMap = { today:'今日', cal:'カレンダー', lists:'リスト' };

      const sceneContent = (
        <div className={dark ? 'paper-bg-dark' : 'paper-bg'} style={{
          width:'100%', height:'100%', overflow:'hidden', position:'relative',
          color: dark ? '#F5F1E6' : '#2B2A26',
          fontFamily: 'var(--hibi-font-body)',
        }}>
          <div style={{ position:'absolute', inset:0, overflowY:'auto' }}>
            <div style={{ height: 0 }}/>
            {tab === 'today' && (
              <>
                <TopBar dark={dark} searchValue={search} setSearchValue={setSearch}/>
                <div style={{ padding:'8px 0 0' }}>
                  <TodayScreen tasks={filtered} onToggle={onToggle} onDelete={onDelete} onFlag={onFlag} onOpen={setDetail} dark={dark} density={settings.density}/>
                </div>
              </>
            )}
            {tab === 'cal' && (
              <>
                <TopBar dark={dark} searchValue={search} setSearchValue={setSearch}/>
                <CalendarScreen tasks={filtered} onToggle={onToggle} onDelete={onDelete} onFlag={onFlag} onOpen={setDetail} dark={dark} density={settings.density}/>
              </>
            )}
            {tab === 'lists' && (
              <>
                <TopBar dark={dark} searchValue={search} setSearchValue={setSearch}/>
                <ListsScreen
                  tasks={filtered}
                  onToggle={onToggle} onDelete={onDelete} onFlag={onFlag} onOpen={setDetail}
                  onOpenCategoryManager={()=>setCategoryMgrOpen(true)}
                  dark={dark} density={settings.density}
                />
              </>
            )}
          </div>

          <TabBar tab={tab} setTab={setTab} onAdd={()=>{ setEditingTask(null); setAddOpen(true); }} dark={dark}/>

          <AddTaskModal
            open={addOpen}
            onClose={()=>{ setAddOpen(false); setEditingTask(null); }}
            onAdd={onAdd}
            onUpdate={onUpdate}
            editTask={editingTask}
            dark={dark}
          />
          <TaskDetail
            task={detail}
            onClose={()=>setDetail(null)}
            onToggle={onToggle}
            onEdit={onStartEdit}
            onDelete={onDelete}
            dark={dark}
          />
          <CategoryManager
            open={categoryMgrOpen} onClose={()=>setCategoryMgrOpen(false)}
            lists={lists} setLists={setLists}
            tasks={tasks} setTasks={setTasks}
            dark={dark}
          />
        </div>
      );

      // fullscreen mode: on narrow viewports or PWA standalone launches, drop the iPhone frame
      const [fullscreen, setFullscreen] = useState(() => {
        if (typeof window === 'undefined') return false;
        const standalone = window.matchMedia?.('(display-mode: standalone)').matches || window.navigator.standalone;
        return standalone || window.innerWidth < 700;
      });
      useEffect(() => {
        const mq = window.matchMedia('(max-width: 699px)');
        const standaloneMq = window.matchMedia('(display-mode: standalone)');
        const update = () => {
          const standalone = standaloneMq.matches || window.navigator.standalone;
          setFullscreen(standalone || mq.matches);
        };
        mq.addEventListener?.('change', update);
        standaloneMq.addEventListener?.('change', update);
        window.addEventListener('resize', update);
        return () => {
          mq.removeEventListener?.('change', update);
          standaloneMq.removeEventListener?.('change', update);
          window.removeEventListener('resize', update);
        };
      }, []);
      useEffect(() => {
        document.body.classList.toggle('hibi-fullscreen', fullscreen);
        document.body.classList.toggle('hibi-dark', !!dark);
      }, [fullscreen, dark]);

      if (fullscreen) {
        return (
          <div data-screen-label={`Hibi ${titleMap[tab]}`} style={{
            width:'100vw', height:'100vh', height:'100dvh', overflow:'hidden',
            paddingTop:'env(safe-area-inset-top)',
            paddingBottom:'env(safe-area-inset-bottom)',
            paddingLeft:'env(safe-area-inset-left)',
            paddingRight:'env(safe-area-inset-right)',
            boxSizing:'border-box',
            background: dark ? '#15130F' : '#FAF7F0',
          }}>
            {sceneContent}
            <TweaksPanel open={tweaksOpen} onClose={()=>setTweaksOpen(false)} settings={settings} setSettings={updateSettings}/>
          </div>
        );
      }

      return (
        <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
          <div data-screen-label={`Hibi ${titleMap[tab]}`}>
            <IOSDevice dark={dark} width={390} height={844}>
              {sceneContent}
            </IOSDevice>
          </div>
          <TweaksPanel open={tweaksOpen} onClose={()=>setTweaksOpen(false)} settings={settings} setSettings={updateSettings}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
